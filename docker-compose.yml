services:

  # ── SOC API Server ────────────────────────────────────────────────
  soc-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soc-api
    ports:
      - "7860:7860"
    environment:
      - API_KEY=${API_KEY:-}
      - API_BASE_URL=${API_BASE_URL:-}
      - MODEL_NAME=${MODEL_NAME:-default-model}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:7860/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
